name: Firebase App Distribution
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mobile/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: "17"
          distribution: temurin
      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps
      - name: Write google-services.json
        working-directory: mobile
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
      - name: Decode keystore
        working-directory: mobile
        run: |
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > nikibhavi.keystore
          echo "Keystore file size: $(wc -c < nikibhavi.keystore) bytes"
      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean
      - name: Copy google-services
        working-directory: mobile
        run: cp google-services.json android/app/google-services.json
      - name: Write signing config to gradle.properties
        working-directory: mobile
        run: |
          cat >> android/gradle.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=../nikibhavi.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "✅ gradle.properties updated"
      - name: Write release signing config to build.gradle
        working-directory: mobile/android
        run: |
          cat > signing.gradle << 'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE
          echo "apply from: 'signing.gradle'" >> app/build.gradle
          echo "✅ signing.gradle applied"
      - name: Build APK for Firebase
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Build AAB for Google Play
        working-directory: mobile/android
        run: ./gradlew bundleRelease --no-daemon
      - name: Verify APK is signed with release key
        working-directory: mobile/android
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then
            echo "✅ APK exists: $(wc -c < $APK) bytes"
            keytool -printcert -jarfile $APK | grep "SHA1" || echo "Could not verify cert"
          else
            echo "❌ APK not found!"
            exit 1
          fi
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-aab-${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  distribute:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: ./apk
      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ${{ secrets.FIREBASE_TESTER_EMAILS }}
          file: ./apk/app-release.apk
          releaseNotes: Build ${{ github.run_number }}

  notify:
    runs-on: ubuntu-latest
    needs: distribute
    steps:
      - name: Send FCM V1 notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYTHON'
          import json, os
          import google.auth.transport.requests
          import google.oauth2.service_account

          sa = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          project_id = os.environ['FIREBASE_PROJECT_ID']
          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/firebase.messaging']
          )
          creds.refresh(google.auth.transport.requests.Request())

          import requests
          url = f'https://fcm.googleapis.com/v1/projects/{project_id}/messages:send'
          r = requests.post(url,
              headers={'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'},
              json={'message': {
                  'topic': 'nikibhavi',
                  'notification': {'title': 'NikiBhavi Updated!', 'body': 'New version available!'},
                  'android': {'priority': 'high'}
              }}
          )
          print(f'FCM response: {r.status_code} {r.text}')
          PYTHON
