name: Firebase App Distribution
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mobile/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Auto increment versionCode
        working-directory: mobile
        run: |
          python3 -c "
          import json
          with open('app.json') as f:
              d = json.load(f)
          v = d['expo']['android'].get('versionCode', 1)
          d['expo']['android']['versionCode'] = v + 1
          with open('app.json', 'w') as f:
              json.dump(d, f, indent=2)
          print(f'versionCode: {v} to {v+1}')
          "

      - name: Write google-services.json
        working-directory: mobile
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Decode keystore
        working-directory: mobile
        run: |
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > nikibhavi.keystore
          ls -la nikibhavi.keystore

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Copy files into android project
        working-directory: mobile
        run: |
          cp google-services.json android/app/google-services.json
          cp nikibhavi.keystore android/app/nikibhavi.keystore

      - name: Setup release signing in gradle.properties
        working-directory: mobile/android
        run: |
          echo "" >> gradle.properties
          echo "STORE_FILE=nikibhavi.keystore" >> gradle.properties
          echo "STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> gradle.properties
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> gradle.properties
          echo "✅ gradle.properties:"
          cat gradle.properties

      - name: Patch app/build.gradle with release signing
        working-directory: mobile/android
        run: |
          python3 << 'PYEOF'
          with open('app/build.gradle', 'r') as f:
              txt = f.read()

          # Add signingConfigs block
          signing = '''
              signingConfigs {
                  release {
                      storeFile file(STORE_FILE)
                      storePassword STORE_PASSWORD
                      keyAlias KEY_ALIAS
                      keyPassword KEY_PASSWORD
                  }
              }'''

          # Insert before android { buildTypes
          if 'signingConfigs' not in txt:
              txt = txt.replace('    buildTypes {', signing + '\n    buildTypes {')

          # Add signingConfig to release buildType
          if 'signingConfig signingConfigs.release' not in txt:
              txt = txt.replace(
                  'release {\n',
                  'release {\n            signingConfig signingConfigs.release\n',
                  1
              )

          with open('app/build.gradle', 'w') as f:
              f.write(txt)

          # Verify
          with open('app/build.gradle', 'r') as f:
              content = f.read()
          if 'signingConfigs' in content:
              print('✅ signingConfigs found in build.gradle')
          else:
              print('❌ signingConfigs NOT found!')
              exit(1)
          if 'signingConfig signingConfigs.release' in content:
              print('✅ signingConfig applied to release buildType')
          else:
              print('❌ signingConfig NOT applied to release!')
              exit(1)
          PYEOF

      - name: Print build.gradle for verification
        working-directory: mobile/android
        run: grep -A 20 "signingConfigs" app/build.gradle

      - name: Build Release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        working-directory: mobile/android
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify APK signed with release key
        working-directory: mobile/android
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          echo "APK size: $(wc -c < $APK) bytes"
          keytool -printcert -jarfile $APK 2>/dev/null | grep -E "SHA1|Owner" || true

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-aab-${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  distribute:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: ./apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ${{ secrets.FIREBASE_TESTER_EMAILS }}
          file: ./apk/app-release.apk
          releaseNotes: "Build ${{ github.run_number }}"

  notify:
    runs-on: ubuntu-latest
    needs: distribute
    steps:
      - name: Send FCM notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYTHON'
          import json, os, requests
          import google.auth.transport.requests
          import google.oauth2.service_account
          sa = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/firebase.messaging'])
          creds.refresh(google.auth.transport.requests.Request())
          r = requests.post(
              f"https://fcm.googleapis.com/v1/projects/{os.environ['FIREBASE_PROJECT_ID']}/messages:send",
              headers={'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'},
              json={'message': {'topic': 'nikibhavi',
                  'notification': {'title': 'NikiBhavi Updated!', 'body': 'New version available!'},
                  'android': {'priority': 'high'}}})
          print(f'FCM: {r.status_code} {r.text}')
          PYTHON
