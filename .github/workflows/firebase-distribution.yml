name: Firebase App Distribution
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mobile/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Auto increment versionCode
        working-directory: mobile
        run: |
          python3 -c "
          import json
          with open('app.json') as f:
              d = json.load(f)
          v = d['expo']['android'].get('versionCode', 1)
          d['expo']['android']['versionCode'] = v + 1
          with open('app.json', 'w') as f:
              json.dump(d, f, indent=2)
          print(f'versionCode: {v} to {v+1}')
          "

      - name: Write google-services.json
        working-directory: mobile
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Decode keystore
        working-directory: mobile
        run: echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > nikibhavi.keystore

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Copy files into android project
        working-directory: mobile
        run: |
          cp google-services.json android/app/google-services.json
          cp nikibhavi.keystore android/app/nikibhavi.keystore

      - name: Print build.gradle for debugging
        working-directory: mobile/android
        run: grep -n "signingConfig\|release\|buildTypes" app/build.gradle

      - name: Patch build.gradle - release signing
        working-directory: mobile/android
        run: |
          python3 << 'PYEOF'
          import re

          with open('app/build.gradle', 'r') as f:
              txt = f.read()

          # Add release entry inside signingConfigs block
          release_entry = '''
              release {
                  storeFile file("nikibhavi.keystore")
                  storePassword project.findProperty("STORE_PASSWORD") ?: ""
                  keyAlias project.findProperty("KEY_ALIAS") ?: ""
                  keyPassword project.findProperty("KEY_PASSWORD") ?: ""
              }'''

          txt = txt.replace(
              'signingConfigs {\n        debug {',
              'signingConfigs {' + release_entry + '\n        debug {'
          )

          # Use regex to find and replace signingConfig inside release buildType
          # Pattern: release { ... signingConfig signingConfigs.debug ... }
          txt = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{[^}]*)signingConfig\s+signingConfigs\.debug',
              r'\1signingConfig signingConfigs.release',
              txt,
              flags=re.DOTALL
          )

          with open('app/build.gradle', 'w') as f:
              f.write(txt)

          # Verify
          result = open('app/build.gradle').read()
          print("=== Signing section ===")
          start = result.find('signingConfigs {')
          print(result[start:start+500])

          assert 'signingConfigs.release' in result, "signingConfig.release not applied!"
          print("✅ Release signing config applied successfully")
          PYEOF

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Build Release AAB
        working-directory: mobile/android
        run: |
          ./gradlew bundleRelease --no-daemon \
            -PSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-aab-${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  distribute:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: ./apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ${{ secrets.FIREBASE_TESTER_EMAILS }}
          file: ./apk/app-release.apk
          releaseNotes: "Build ${{ github.run_number }}"

  notify:
    runs-on: ubuntu-latest
    needs: distribute
    steps:
      - name: Send FCM notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYTHON'
          import json, os, requests
          import google.auth.transport.requests
          import google.oauth2.service_account
          sa = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/firebase.messaging'])
          creds.refresh(google.auth.transport.requests.Request())
          r = requests.post(
              f"https://fcm.googleapis.com/v1/projects/{os.environ['FIREBASE_PROJECT_ID']}/messages:send",
              headers={'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'},
              json={'message': {'topic': 'nikibhavi',
                  'notification': {'title': 'NikiBhavi Updated!', 'body': 'New version available!'},
                  'android': {'priority': 'high'}}})
          print(f'FCM: {r.status_code} {r.text}')
          PYTHON
