name: Firebase App Distribution
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mobile/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Auto increment versionCode
        working-directory: mobile
        run: |
          python3 -c "
          import json
          with open('app.json') as f:
              d = json.load(f)
          v = d['expo']['android'].get('versionCode', 1)
          d['expo']['android']['versionCode'] = v + 1
          with open('app.json', 'w') as f:
              json.dump(d, f, indent=2)
          print(f'versionCode: {v} to {v+1}')
          "

      - name: Write google-services.json
        working-directory: mobile
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Decode keystore
        working-directory: mobile
        run: echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > nikibhavi.keystore

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Copy files into android project
        working-directory: mobile
        run: |
          cp google-services.json android/app/google-services.json
          cp nikibhavi.keystore android/app/nikibhavi.keystore

      - name: Patch build.gradle - add release signingConfig
        working-directory: mobile/android
        run: |
          python3 << 'PYEOF'
          with open('app/build.gradle', 'r') as f:
              txt = f.read()

          print("=== BEFORE ===")
          # Find signingConfigs block
          idx = txt.find('signingConfigs {')
          print(txt[idx:idx+200])

          # Add release entry inside existing signingConfigs block
          # Expo generates: signingConfigs {\n        debug {
          # We add release config after the debug closing brace

          release_entry = """
              release {
                  storeFile file("nikibhavi.keystore")
                  storePassword "$STORE_PASSWORD"
                  keyAlias "$KEY_ALIAS"
                  keyPassword "$KEY_PASSWORD"
              }"""

          # Insert release config inside signingConfigs block after debug block
          txt = txt.replace(
              'signingConfigs {\n        debug {',
              'signingConfigs {' + release_entry + '\n        debug {'
          )

          # Replace signingConfigs.debug with signingConfigs.release in release buildType
          # Only replace inside the release { } block
          txt = txt.replace(
              'release {\n            signingConfig signingConfigs.debug',
              'release {\n            signingConfig signingConfigs.release'
          )

          with open('app/build.gradle', 'w') as f:
              f.write(txt)

          print("=== AFTER ===")
          with open('app/build.gradle', 'r') as f:
              content = f.read()
          idx = content.find('signingConfigs {')
          print(content[idx:idx+400])

          assert 'signingConfigs.release' in content, "ERROR: signingConfig.release not found!"
          print("✅ Release signing config injected successfully")
          PYEOF

      - name: Write passwords to local.properties
        working-directory: mobile/android
        run: |
          echo "STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> local.properties

      - name: Build Release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon -PSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Build Release AAB
        working-directory: mobile/android
        run: ./gradlew bundleRelease --no-daemon -PSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: nikibhavi-aab-${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  distribute:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: nikibhavi-apk-${{ github.run_number }}
          path: ./apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ${{ secrets.FIREBASE_TESTER_EMAILS }}
          file: ./apk/app-release.apk
          releaseNotes: "Build ${{ github.run_number }}"

  notify:
    runs-on: ubuntu-latest
    needs: distribute
    steps:
      - name: Send FCM notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYTHON'
          import json, os, requests
          import google.auth.transport.requests
          import google.oauth2.service_account
          sa = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/firebase.messaging'])
          creds.refresh(google.auth.transport.requests.Request())
          r = requests.post(
              f"https://fcm.googleapis.com/v1/projects/{os.environ['FIREBASE_PROJECT_ID']}/messages:send",
              headers={'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'},
              json={'message': {'topic': 'nikibhavi',
                  'notification': {'title': 'NikiBhavi Updated!', 'body': 'New version available!'},
                  'android': {'priority': 'high'}}})
          print(f'FCM: {r.status_code} {r.text}')
          PYTHON
