<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a2a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9F53B;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9F53B;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="200" r="400" fill="url(#glow)"/>

  <!-- Lime accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#C9F53B"/>

  <!-- Flag emoji area -->
  <text x="80" y="180" font-size="80" font-family="serif">🇮🇳</text>
  <text x="175" y="175" font-size="50" font-family="serif" fill="#C9F53B">❤️</text>
  <text x="235" y="180" font-size="80" font-family="serif">🇲🇾</text>

  <!-- Main title -->
  <text x="80" y="270" font-size="64" font-weight="900" fill="#ffffff" font-family="Arial, sans-serif">NikiBhavi</text>

  <!-- Tagline -->
  <text x="80" y="330" font-size="30" fill="#C9F53B" font-family="Arial, sans-serif" font-weight="700">Malaysia Life Guide for Indians</text>

  <!-- Description -->
  <text x="80" y="390" font-size="22" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif">Visa • Tax • Salary • EPF • Remittance • Cost of Living</text>
  <text x="80" y="425" font-size="22" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif">14 Free Tools + 17 Complete Guides</text>

  <!-- Tool pills -->
  <rect x="80"  y="460" width="160" height="38" rx="19" fill="rgba(201,245,59,0.12)" stroke="#C9F53B" stroke-width="1.5"/>
  <text x="160" y="484" text-anchor="middle" font-size="16" fill="#C9F53B" font-family="Arial, sans-serif" font-weight="700">💼 Employee Pass</text>

  <rect x="255" y="460" width="160" height="38" rx="19" fill="rgba(201,245,59,0.12)" stroke="#C9F53B" stroke-width="1.5"/>
  <text x="335" y="484" text-anchor="middle" font-size="16" fill="#C9F53B" font-family="Arial, sans-serif" font-weight="700">🧾 Tax Calculator</text>

  <rect x="430" y="460" width="160" height="38" rx="19" fill="rgba(201,245,59,0.12)" stroke="#C9F53B" stroke-width="1.5"/>
  <text x="510" y="484" text-anchor="middle" font-size="16" fill="#C9F53B" font-family="Arial, sans-serif" font-weight="700">💸 Remittance</text>

  <rect x="605" y="460" width="160" height="38" rx="19" fill="rgba(201,245,59,0.12)" stroke="#C9F53B" stroke-width="1.5"/>
  <text x="685" y="484" text-anchor="middle" font-size="16" fill="#C9F53B" font-family="Arial, sans-serif" font-weight="700">🧮 Cost of Living</text>

  <!-- URL -->
  <text x="80" y="570" font-size="20" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif">nikibhavi.msdevbuild.com</text>

  <!-- Stats -->
  <text x="1120" y="540" text-anchor="end" font-size="18" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif">10K+ Subscribers</text>
</svg>
